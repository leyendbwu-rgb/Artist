<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leyendwithuke</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Josefin+Sans:ital,wght@0,200;0,400;0,600;1,200&family=Playfair+Display:ital@1&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #04030f;
      --bg2:       #07051a;
      --deep:      #0b0826;
      --blue1:     #1a3aff;
      --blue2:     #0099ff;
      --blue3:     #5bc8ff;
      --purple1:   #6a00c8;
      --purple2:   #9d4fff;
      --purple3:   #cca8ff;
      --mist:      #bbd4ff;
      --text:      #e8eeff;
      --subtext:   #8899cc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Josefin Sans', sans-serif;
      overflow-x: hidden;
      cursor: default;
    }

    /* ── BACKGROUND AURORA ── */
    .aurora {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      overflow: hidden;
    }
    .aurora-layer {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift linear infinite alternate;
    }
    .a1 { width: 70vw; height: 60vh; background: radial-gradient(circle, var(--blue1), transparent 70%);
          top: -10%; left: -15%; animation-duration: 18s; }
    .a2 { width: 55vw; height: 55vh; background: radial-gradient(circle, var(--purple1), transparent 70%);
          top: 30%; right: -10%; animation-duration: 22s; animation-delay: -8s; }
    .a3 { width: 45vw; height: 45vh; background: radial-gradient(circle, var(--blue2), transparent 70%);
          bottom: -5%; left: 20%; animation-duration: 16s; animation-delay: -4s; }
    @keyframes drift {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(6vh) scale(1.08); }
    }

    /* ── STAR FIELD ── */
    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── HERO ── */
    header {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 3rem 2rem 5rem;
    }

    .uke-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 18px var(--blue2));
      animation: floatIcon 4s ease-in-out infinite;
    }
    @keyframes floatIcon {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }

    .hero-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.5em;
      color: var(--blue3);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: reveal 0.9s 0.2s ease forwards;
    }

    .hero-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.4rem, 9vw, 7.5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: 0.03em;
      background: linear-gradient(135deg, var(--blue3) 0%, var(--blue2) 25%, var(--purple2) 60%, var(--purple3) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(90,90,255,0.4));
      opacity: 0;
      animation: reveal 1s 0.4s ease forwards;
    }

    .hero-rule {
      width: 160px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue2), var(--purple2), transparent);
      margin: 1.8rem auto;
      opacity: 0; animation: reveal 1s 0.6s ease forwards;
    }

    .hero-sub {
      font-size: clamp(0.78rem, 2vw, 0.92rem);
      font-style: italic;
      font-family: 'Playfair Display', serif;
      color: var(--subtext);
      letter-spacing: 0.12em;
      max-width: 380px;
      line-height: 1.8;
      opacity: 0; animation: reveal 1s 0.8s ease forwards;
    }

    .scroll-cue {
      position: absolute; bottom: 2.5rem;
      font-size: 0.6rem; letter-spacing: 0.35em;
      color: var(--purple2); opacity: 0.6;
      animation: pulse 2.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }
    @keyframes reveal {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── SECTION SHELL ── */
    .section {
      position: relative; z-index: 2;
      max-width: 1080px; margin: 0 auto;
      padding: 5rem 1.5rem;
    }

    .sec-label {
      font-size: 0.62rem; letter-spacing: 0.45em;
      color: var(--blue2); text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .sec-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      background: linear-gradient(120deg, var(--mist), var(--purple3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 3rem;
      line-height: 1.2;
    }

    /* ── DIVIDER ── */
    .divider {
      position: relative; z-index: 2;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--blue1) 30%, var(--purple1) 70%, transparent 100%);
    }

    /* ── TRACK GRID ── */
    .track-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.8rem;
    }

    /* ── TRACK CARD ── */
    .track-card {
      position: relative;
      background: linear-gradient(145deg, rgba(26,18,60,0.9), rgba(7,5,26,0.95));
      border: 1px solid rgba(100, 120, 255, 0.18);
      border-radius: 4px;
      padding: 1.6rem;
      overflow: hidden;
      transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease;
    }
    .track-card:hover {
      transform: translateY(-4px);
      border-color: rgba(100,160,255,0.45);
      box-shadow: 0 8px 40px rgba(26,58,255,0.18), 0 0 0 1px rgba(100,160,255,0.1);
    }

    /* shimmer top line */
    .track-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--blue1), var(--purple2), var(--blue2));
      opacity: 0.7;
    }

    /* subtle inner glow */
    .track-card::after {
      content: '';
      position: absolute; top: -40%; left: -10%;
      width: 60%; height: 60%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26,58,255,0.07), transparent 70%);
      pointer-events: none;
    }

    .track-header {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.2rem;
    }

    .track-num {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.5rem; line-height: 1;
      color: var(--blue1);
      opacity: 0.5;
      min-width: 2rem; text-align: center;
      transition: opacity .3s, color .3s;
    }
    .track-card:hover .track-num { opacity: 1; color: var(--blue3); }

    .track-info { flex: 1; }
    .track-name {
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.1em;
      color: var(--mist);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .track-hint {
      font-size: 0.68rem; letter-spacing: 0.08em;
      color: var(--subtext); font-style: italic;
    }

    .track-status {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--purple1);
      transition: background .3s, box-shadow .3s;
      flex-shrink: 0;
    }
    .track-card.has-audio .track-status {
      background: var(--blue2);
      box-shadow: 0 0 8px var(--blue2);
    }

    /* Drop Zone */
    .drop-zone {
      position: relative;
      border: 1.5px dashed rgba(90, 120, 255, 0.3);
      border-radius: 3px;
      padding: 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .25s, background .25s;
      background: rgba(20,15,50,0.4);
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--blue2);
      background: rgba(26,58,255,0.08);
    }

    .drop-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .drop-icon { font-size: 1.5rem; margin-bottom: 0.4rem; opacity: 0.5; }
    .drop-text {
      font-size: 0.68rem; letter-spacing: 0.12em;
      color: var(--subtext); text-transform: uppercase;
    }
    .drop-text span { color: var(--blue3); }

    /* Custom audio player */
    .audio-player {
      display: none;
      margin-top: 0.8rem;
    }
    .track-card.has-audio .audio-player { display: block; }
    .track-card.has-audio .drop-zone { display: none; }

    .player-filename {
      font-size: 0.68rem; letter-spacing: 0.08em;
      color: var(--blue3); margin-bottom: 0.8rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .player-controls {
      display: flex; align-items: center; gap: 0.7rem;
    }

    .play-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue1), var(--purple1));
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 0 12px rgba(26,58,255,0.4);
    }
    .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(26,58,255,0.65); }
    .play-btn svg { width: 12px; height: 12px; fill: white; margin-left: 2px; }
    .play-btn.playing svg { margin-left: 0; }

    .progress-wrap {
      flex: 1; position: relative; height: 4px;
      background: rgba(100,120,255,0.18);
      border-radius: 2px; cursor: pointer; overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--blue2), var(--purple2));
      border-radius: 2px;
      width: 0%; transition: width 0.1s linear;
    }

    .time-label {
      font-size: 0.62rem; letter-spacing: 0.06em;
      color: var(--subtext); white-space: nowrap; flex-shrink: 0;
    }

    .remove-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(150,120,255,0.4); font-size: 0.9rem;
      transition: color .2s; flex-shrink: 0; line-height: 1;
    }
    .remove-btn:hover { color: var(--purple3); }

    /* waveform visual (decorative) */
    .mini-wave {
      display: flex; align-items: flex-end; gap: 2px;
      height: 22px; margin-bottom: 0.5rem; opacity: 0.4;
    }
    .mini-wave span {
      flex: 1; border-radius: 1px 1px 0 0;
      background: linear-gradient(to top, var(--blue1), var(--purple2));
      animation: miniWave ease-in-out infinite alternate;
    }
    @keyframes miniWave { from{transform:scaleY(.2)} to{transform:scaleY(1)} }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 2;
      text-align: center; padding: 3rem 1.5rem 2rem;
      border-top: 1px solid rgba(100,120,255,0.12);
    }
    .footer-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.3rem;
      background: linear-gradient(90deg, var(--blue3), var(--purple3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    footer p {
      font-size: 0.65rem; letter-spacing: 0.2em;
      color: rgba(140,150,200,0.4); margin-top: 0.7rem;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- Aurora bg -->
<div class="aurora">
  <div class="aurora-layer a1"></div>
  <div class="aurora-layer a2"></div>
  <div class="aurora-layer a3"></div>
</div>
<canvas class="stars" id="stars"></canvas>

<!-- ── HERO ── -->
<header>
  <div class="uke-icon">🪕</div>
  <p class="hero-eyebrow">✦ Música · Alma · Cuerdas ✦</p>
  <h1 class="hero-title">Leyendwithuke</h1>
  <div class="hero-rule"></div>
  <p class="hero-sub">Cuatro cuerdas. Historias infinitas.<br>Cada nota, una leyenda.</p>
  <span class="scroll-cue">▼ &nbsp; scroll</span>
</header>

<div class="divider"></div>

<!-- ── TRACKS ── -->
<div class="section">
  <p class="sec-label">▸ Discografía</p>
  <h2 class="sec-title">Mis Canciones</h2>

  <div class="track-grid" id="trackGrid">

    <!-- 8 track cards generated by JS -->

  </div>
</div>

<div class="divider"></div>

<!-- ── FOOTER ── -->
<footer>
  <div class="footer-title">Leyendwithuke</div>
  <p>© 2026 · its_Leyend Music · Hecho con alma y ukulele</p>
</footer>

<script>
/* ── STARS ── */
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
const STARS = Array.from({length: 160}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.2 + 0.2,
  a: Math.random(),
  speed: Math.random() * 0.004 + 0.001
}));
function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  STARS.forEach(s => {
    s.a += s.speed;
    const alpha = (Math.sin(s.a) + 1) / 2 * 0.7 + 0.1;
    ctx.beginPath();
    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(180,200,255,${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

/* ── TRACK NAMES (placeholder) ── */
const DEFAULT_NAMES = [
  'Track 01', 'Track 02', 'Track 03', 'Track 04',
  'Track 05', 'Track 06', 'Track 07', 'Track 08'
];

/* ── BUILD CARDS ── */
const grid = document.getElementById('trackGrid');
const audioElements = {};

DEFAULT_NAMES.forEach((name, i) => {
  const card = document.createElement('div');
  card.className = 'track-card';
  card.dataset.index = i;

  /* decorative mini wave */
  const waveBars = Array.from({length: 18}, (_,j) => {
    const h = Math.random() * 80 + 20;
    const delay = (j * 0.07).toFixed(2);
    const dur   = (0.4 + Math.random() * 0.6).toFixed(2);
    return `<span style="height:${h}%;animation-duration:${dur}s;animation-delay:${delay}s"></span>`;
  }).join('');

  card.innerHTML = `
    <div class="track-header">
      <div class="track-num">${String(i+1).padStart(2,'0')}</div>
      <div class="track-info">
        <div class="track-name" contenteditable="true" spellcheck="false">${name}</div>
        <div class="track-hint">Haz clic en el nombre para editarlo</div>
      </div>
      <div class="track-status"></div>
    </div>

    <div class="drop-zone" id="dz${i}">
      <input type="file" accept=".m4a,audio/*" id="file${i}" data-index="${i}"/>
      <div class="drop-icon">🎵</div>
      <div class="drop-text">Arrastra tu <span>.m4a</span> aquí<br>o haz clic para explorar</div>
    </div>

    <div class="audio-player" id="player${i}">
      <div class="mini-wave">${waveBars}</div>
      <div class="player-filename" id="fname${i}">—</div>
      <div class="player-controls">
        <button class="play-btn" id="pbtn${i}" data-index="${i}">
          <svg viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9"/></svg>
        </button>
        <div class="progress-wrap" id="pw${i}" data-index="${i}">
          <div class="progress-bar" id="pb${i}"></div>
        </div>
        <span class="time-label" id="tl${i}">0:00</span>
        <button class="remove-btn" data-index="${i}" title="Quitar audio">✕</button>
      </div>
    </div>
  `;

  grid.appendChild(card);

  /* ── file input handler ── */
  const fileInput = card.querySelector(`#file${i}`);
  fileInput.addEventListener('change', e => loadAudio(i, e.target.files[0]));

  /* ── drag & drop ── */
  const dz = card.querySelector(`#dz${i}`);
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) loadAudio(i, file);
  });

  /* ── play button ── */
  card.querySelector(`#pbtn${i}`).addEventListener('click', () => togglePlay(i));

  /* ── progress click ── */
  card.querySelector(`#pw${i}`).addEventListener('click', e => {
    const audio = audioElements[i];
    if (!audio) return;
    const rect = e.currentTarget.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  });

  /* ── remove btn ── */
  card.querySelector('.remove-btn').addEventListener('click', () => removeAudio(i));
});

/* ── LOAD AUDIO ── */
function loadAudio(idx, file) {
  if (!file) return;
  const url = URL.createObjectURL(file);
  const audio = new Audio(url);
  audioElements[idx] = audio;

  const card = grid.querySelector(`[data-index="${idx}"]`);
  card.classList.add('has-audio');
  card.querySelector(`#fname${idx}`).textContent = file.name;

  audio.addEventListener('timeupdate', () => updateProgress(idx));
  audio.addEventListener('ended', () => resetPlay(idx));
}

/* ── PLAY / PAUSE ── */
function togglePlay(idx) {
  const audio = audioElements[idx];
  if (!audio) return;
  const btn = document.getElementById(`pbtn${idx}`);
  if (audio.paused) {
    /* pause all others */
    Object.entries(audioElements).forEach(([k, a]) => {
      if (Number(k) !== idx && !a.paused) { a.pause(); resetPlay(Number(k)); }
    });
    audio.play();
    btn.classList.add('playing');
    btn.innerHTML = `<svg viewBox="0 0 10 10" fill="white"><rect x="1" y="1" width="3" height="8"/><rect x="6" y="1" width="3" height="8"/></svg>`;
  } else {
    audio.pause();
    btn.classList.remove('playing');
    btn.innerHTML = `<svg viewBox="0 0 10 10" fill="white"><polygon points="2,1 9,5 2,9"/></svg>`;
  }
}

function resetPlay(idx) {
  const btn = document.getElementById(`pbtn${idx}`);
  if (btn) {
    btn.classList.remove('playing');
    btn.innerHTML = `<svg viewBox="0 0 10 10" fill="white"><polygon points="2,1 9,5 2,9"/></svg>`;
  }
}

/* ── PROGRESS ── */
function updateProgress(idx) {
  const audio = audioElements[idx];
  if (!audio || !audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById(`pb${idx}`).style.width = pct + '%';
  document.getElementById(`tl${idx}`).textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
}

function fmt(s) {
  const m = Math.floor(s / 60);
  const ss = Math.floor(s % 60).toString().padStart(2,'0');
  return `${m}:${ss}`;
}

/* ── REMOVE ── */
function removeAudio(idx) {
  const audio = audioElements[idx];
  if (audio) { audio.pause(); delete audioElements[idx]; }
  const card = grid.querySelector(`[data-index="${idx}"]`);
  card.classList.remove('has-audio');
  document.getElementById(`pb${idx}`).style.width = '0%';
  document.getElementById(`tl${idx}`).textContent = '0:00';
  resetPlay(idx);
  /* reset file input */
  const fi = document.getElementById(`file${idx}`);
  fi.value = '';
}
</script>
</body>
</html>
